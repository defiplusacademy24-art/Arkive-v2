kind = "web"
  previewPath = "/"
  title = "Arkive"
  version = "1.0.0"
  id = "artifacts/rialo-legacy"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 22622

  [services.development]
  run = "pnpm --filter @workspace/rialo-legacy run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/rialo-legacy", "run", "build" ]
  publicDir = "artifacts/rialo-legacy/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "22622"
  BASE_PATH = "/"
